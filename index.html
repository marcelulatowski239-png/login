<input id="username" type="text" placeholder="Username">

let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){

window.location.href = "https://youtu.be/BNL6ImhgCnk?is=kijEOemht_R4i0e9";

}
else{
alert("Wrong login!");
}

}

</script>

</body>
